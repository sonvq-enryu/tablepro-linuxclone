name: Build OS Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: deb
          - os: macos-13
            target: pkg
          - os: macos-14
            target: pkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build package
        run: bash scripts/build_${{ matrix.target }}.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tablefree-${{ matrix.os }}-${{ matrix.target }}
          path: |
            dist/*.deb
            dist/*.pkg
          if-no-files-found: error
